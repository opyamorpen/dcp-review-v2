service:
  app_id: 709xehle
  name: DCP评审中心
  description: 团队级DCP/TR评审插件。支持项目内发起DCP阶段决策评审和TR技术评审、多人异步评审、关联工作项、不可覆盖决议快照和审计追溯。
  version: 1.18.2
  mode: org
  logo: null
  language: nodejs
  language_version: 1.11.33
  host_version: 1.11.33
  host_sub_version: 1.11.33
  min_system_version: 3.11.39
  auth: null
  config: null
  scope: 1
  policy:
    policy: standard
    target: ''
  permission:
    - name: DCP 插件管理
      field: dcp_admin
      desc: 允许修改DCP评审模板、阶段、角色、检查项等全局配置
    - name: 新建 DCP 评审
      field: dcp_create_review
      desc: 允许在项目内新建DCP决策评审单
    - name: 查看 DCP 评审总览
      field: dcp_view_review
      desc: 允许查看团队DCP评审总览页面
modules:
  - id: dcp-review-tab
    moduleType: ones:project:component:new
    title: DCP评审
    description: 项目内DCP评审工作台：评审列表、创建评审单、材料/指标/评审人/意见/关联工作项/决议/审计
    entry: ./modules/dcp-review-tab/index.tsx
  - id: dcp-reviewer-workspace
    moduleType: ones:workspace:new
    title: DCP评审工作台
    description: 评审人工作台：查看待评审单、填写评审意见、关联工作项
    entry: modules/dcp-reviewer-workspace/index.html
  - id: dcp-sidebar
    moduleType: ones:app:new
    title: DCP评审中心
    modules:
      - id: dcp-template-config
        title: 模板配置
        entry: modules/dcp-sidebar/dcp-template-config/index.html
        permission: dcp_admin
      - id: dcp-review-overview
        title: 评审总览
        entry: modules/dcp-sidebar/dcp-review-overview/index.html
        permission: dcp_view_review
abilities:
  - id: dcp-project-component
    name: ProjectCustomComponent
    version: 1.0.0
    abilityType: ProjectCustomComponent
    function:
      copyPluginData: copyPluginDataForDCP
    relateModule:
      componentModuleEnter: dcp-review-tab
    config:
      - key: component_name
        label: 组件名称
        value: DCP评审
        fieldType: Input
        show: true
      - key: component_desc
        label: 组件描述
        value: DCP决策评审控制台
        fieldType: TextArea
        show: true
      - key: is_support_copy
        label: 支持数据复制
        value: false
        fieldType: Switch
        show: false
  - id: dcp-sidebar-menu
    name: 侧边栏菜单
    version: 1.0.0
    abilityType: SidebarMenu
    relateModule:
      systemMenu: dcp-sidebar
