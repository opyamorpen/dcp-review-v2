storage:
  entities:
    - name: dcp_base_config
      attributes:
        key:
          type: text
          length: 64
          default: ''
        value:
          type: text
          length: 32768
          default: ''
    - name: dcp_phase_template
      attributes:
        phase_code:
          type: text
          length: 16
          default: ''
        phase_name:
          type: text
          length: 64
          default: ''
        resolution_options:
          type: text
          length: 4096
          default: '[]'
        resolution_template:
          type: text
          length: 8192
          default: ''
        sort_order:
          type: integer
          length: 8
          default: 0
        review_type:
          type: text
          length: 8
          default: dcp
        dependencies:
          type: text
          length: 1024
          default: '[]'
    - name: dcp_material_template
      attributes:
        material_name:
          type: text
          length: 128
          default: ''
        applicable_phases:
          type: text
          length: 512
          default: '[]'
        required:
          type: boolean
          default: false
        responsible_role:
          type: text
          length: 64
          default: ''
        sort_order:
          type: integer
          length: 8
          default: 0
        review_type:
          type: text
          length: 8
          default: dcp
    - name: dcp_indicator_template
